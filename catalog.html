<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог жилья — ДомГость</title>
  <meta name="description" content="Найдите жильё для отдыха в любом городе России. Фильтры по типу, цене, удобствам. Мгновенные результаты.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Unbounded:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

<main style="padding:32px 0 72px;">
  <div class="container">
    <!-- breadcrumb -->
    <nav class="breadcrumb" aria-label="Хлебные крошки">
      <a href="index.html">Главная</a>
      <span class="breadcrumb__sep">›</span>
      <span id="breadcrumbCurrent">Каталог</span>
    </nav>
    <h1 style="font-size:clamp(1.5rem,3vw,2rem);margin-bottom:6px;" id="catalogTitle">Все объекты</h1>
    <p style="color:var(--muted);margin-bottom:24px;" id="catalogSubtitle">Выберите жильё из нашей базы</p>

    <!-- mobile filters btn -->
    <button class="btn btn--outline mobile-filters-btn" id="mobileFiltersBtn" style="margin-bottom:20px;gap:8px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      Фильтры
    </button>

    <div class="catalog-layout">
      <!-- SIDEBAR -->
      <aside class="catalog-sidebar" id="catalogSidebar">
        <div class="sidebar__title" style="margin-top:0;padding-top:0;border:none;">Тип жилья</div>
        <div class="filter-checkboxes" id="typeFilters">
          <label class="filter-check"><input type="checkbox" value="Отель"> Отель</label>
          <label class="filter-check"><input type="checkbox" value="Квартира"> Квартира</label>
          <label class="filter-check"><input type="checkbox" value="Гостевой дом"> Гостевой дом</label>
          <label class="filter-check"><input type="checkbox" value="Коттедж"> Коттедж</label>
        </div>

        <div class="sidebar__title">Категория</div>
        <div class="filter-chips" id="categoryFilters">
          <span class="chip" data-cat="Море">🏖️ Море</span>
          <span class="chip" data-cat="Город">🏙️ Город</span>
          <span class="chip" data-cat="Горы">🏔️ Горы</span>
          <span class="chip" data-cat="Природа">🌿 Природа</span>
        </div>

        <div class="sidebar__title">Цена за ночь (₽)</div>
        <div class="price-range">
          <input type="number" class="form-input" id="priceMin" placeholder="от" min="0" step="100" style="width:50%">
          <span style="color:var(--muted)">—</span>
          <input type="number" class="form-input" id="priceMax" placeholder="до" min="0" step="100" style="width:50%">
        </div>

        <div class="sidebar__title">Гости (не менее)</div>
        <div class="guests-counter">
          <button class="guests-btn" id="filterGuestsMinus" aria-label="Уменьшить">−</button>
          <span class="guests-count" id="filterGuestsCount">1</span>
          <button class="guests-btn" id="filterGuestsPlus" aria-label="Увеличить">+</button>
        </div>

        <div class="sidebar__title">Удобства</div>
        <div class="filter-checkboxes" id="amenitiesFilters">
          <label class="filter-check"><input type="checkbox" value="Wi-Fi"> Wi-Fi</label>
          <label class="filter-check"><input type="checkbox" value="Кухня"> Кухня</label>
          <label class="filter-check"><input type="checkbox" value="Кондиционер"> Кондиционер</label>
          <label class="filter-check"><input type="checkbox" value="Парковка"> Парковка</label>
          <label class="filter-check"><input type="checkbox" value="Бассейн"> Бассейн</label>
          <label class="filter-check"><input type="checkbox" value="Баня"> Баня</label>
        </div>

        <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--line);">
          <button class="btn btn--outline" style="width:100%;" id="resetFilters">Сбросить фильтры</button>
        </div>
      </aside>

      <!-- RESULTS -->
      <div>
        <div class="catalog-toolbar">
          <div class="catalog-toolbar__count" id="resultsCount">Загрузка...</div>
          <select class="sort-select" id="sortSelect">
            <option value="rating">По популярности</option>
            <option value="price_asc">Цена: сначала дешевле</option>
            <option value="price_desc">Цена: сначала дороже</option>
            <option value="rating_asc">Рейтинг: по возрастанию</option>
          </select>
        </div>
        <div class="listings-grid listings-grid--3" id="catalogGrid"></div>
      </div>
    </div>
  </div>
</main>

<!-- Mobile sidebar overlay -->
<div id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:149;" onclick="closeMobileSidebar()"></div>

<script src="assets/js/data.js" defer></script>
<script src="assets/js/ui.js" defer></script>
<script src="assets/js/catalog.js" defer></script>
</body>
</html>
